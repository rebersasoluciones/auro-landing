<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURO · Lata 3D (prototipo)</title>
<meta name="robots" content="noindex">
<style>
  :root{ --crema:#F4EFE5; --negro-oliva:#171713; --dorado:#B9983A; --verde-oliva:#6F6B2E; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ background:var(--crema); font-family:'Inter',system-ui,sans-serif; color:var(--negro-oliva); overflow:hidden; }

  model-viewer{
    width:100%; height:100%;
    --poster-color:transparent;
    --progress-bar-color:var(--dorado);
    background:var(--crema);
  }

  .ui{ position:fixed; left:0; right:0; pointer-events:none; z-index:2; }
  .ui--top{ top:0; padding:22px 26px; }
  .ui--bottom{ bottom:0; padding:22px 26px; text-align:center; }
  .brand{ font-family:'Oswald','Arial Narrow',sans-serif; font-weight:700; letter-spacing:.02em; font-size:1.5rem; text-transform:uppercase; }
  .tag{ display:inline-block; margin-top:2px; font-size:.7rem; letter-spacing:.16em; text-transform:uppercase; color:var(--verde-oliva); }
  .hint{
    display:inline-flex; gap:.5em; align-items:center;
    background:rgba(23,23,19,.82); color:var(--crema);
    font-size:.72rem; letter-spacing:.1em; text-transform:uppercase;
    padding:.6em 1.1em; border-radius:999px; backdrop-filter:blur(4px);
    transition:opacity .5s ease;
  }
  /* Botón AR (model-viewer) */
  .ar-btn{
    position:absolute; top:16px; right:16px;
    background:var(--negro-oliva); color:var(--crema);
    font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; font-size:.74rem;
    padding:.7em 1.2em; border-radius:999px; border:0; cursor:pointer;
  }
</style>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
</head>
<body>

<model-viewer
    src="assets/3d/lata.glb"
    alt="Lata de AURO — aceite de oliva virgen extra, modelo 3D interactivo"
    poster="assets/lata-auro.png"
    camera-controls
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="22deg"
    interaction-prompt="auto"
    camera-orbit="-25deg 78deg auto"
    min-camera-orbit="auto 0deg auto"
    max-camera-orbit="auto 180deg auto"
    shadow-intensity="1"
    shadow-softness="0.9"
    exposure="1"
    environment-image="neutral"
    ar
    ar-modes="webxr scene-viewer quick-look"
    touch-action="pan-y">
  <button slot="ar-button" class="ar-btn">Ver en tu espacio (AR)</button>
</model-viewer>

<div class="ui ui--top">
  <div class="brand">AURO</div>
  <span class="tag">Lata 3D · prototipo</span>
</div>
<div class="ui ui--bottom">
  <span class="hint">↔ Arrastra para girar · rueda / pellizca para zoom</span>
</div>

</body>
</html>
